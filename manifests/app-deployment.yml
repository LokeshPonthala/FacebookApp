---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devopsapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: cont-1
          image: mustafaflm.azurecr.io/app:128
          ports:
            - containerPort: 8080
      imagePullSecrets:
        - name: Lokesh




---
apiVersion: v1
kind: Service
metadata:
  name: appsvc
spec:
  type: LoadBalancer
  selector:
    app: myapp
  ports:
    - port: 8080
      targetPort: 8080
